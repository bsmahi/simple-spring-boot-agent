<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <title>Spring AI URL Summarizer</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
          rel="stylesheet">

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Roboto", Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f4f6f9;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        h2 {
            margin-top: 0;
            color: #1976d2;
            font-weight: 500;
        }

        form {
            margin-top: 25px;
        }

        input[type=text] {
            width: 100%;
            padding: 14px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.2s ease;
        }

        input[type=text]:focus {
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.15);
        }

        button {
            margin-top: 18px;
            padding: 12px 24px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1565c0;
        }

        .summary-box {
            margin-top: 35px;
            padding: 25px;
            background-color: #f9fafc;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            line-height: 1.8;
        }

        .summary-box h3 {
            color: #1976d2;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .summary-box p {
            color: #333;
            font-size: 1.1em;
        }

        .summary-box ul {
            padding-left: 22px;
        }

        .summary-box li {
            margin-bottom: 10px;
            color: #333;
        }

    </style>
</head>
<body>
<div class="container">

    <h2>Spring AI URL Summarizer</h2>

    <form action="/summarize" method="post">

        <label>
            <input type="text"
                   name="url"
                   placeholder="Enter URL (https://example.com)"
                   required/>
        </label>

        <button type="submit">
            Summarize
        </button>

    </form>

    <div class="summary-box"
         th:if="${summary}">

        <div th:utext="${summary}"></div>

    </div>

</div>
</body>
</html>
